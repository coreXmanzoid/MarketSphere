{% extends 'authbase.html' %}
{% load static %}
{% block title %}MatketSphere • Login{% endblock %}
{% block css %}
<link rel="stylesheet" href="{% static 'login.css' %}">
{% endblock %}
{% block content %}
<div class="container">
    <div class="row justify-content-center py-5">
        <div class="col-md-4">
            <div class="card">
                <div class="card-header">
                    <h3>Welcome Back!</h3>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label for="identifier" class="form-label">Username/Email</label>
                            <input type="text" class="form-control" id="identifier" name="identifier"
                                placeholder="Cristy/cristy@gmail.com" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" name="password"
                                placeholder="3qi(l_kiA&b" required>
                        </div>

                        <div class="d-flex">
                            <div class="mb-2">
                                <label for="remember" class="form-check-label">
                                    <input type="checkbox" class="form-check-input" id="remember" name="remember">
                                    Remember Me
                                </label>
                            </div>
                            <a href="{% url 'account_reset_password' %}" class="ms-auto">Forget Password?</a> <br>

                        </div>
                        <button type="submit" class="btn">Login</button>
                        <div class="divider">
                            <hr>
                            <span>OR</span>
                            <hr>
                        </div>
                        <div class="d-flex continue-button me-2 mb-2">
                            <a href="{% url 'google_login' %}" class="me-2">
                                <i class="bi bi-google"></i> Google
                            </a>
                            <a href="{% url 'google_login' %}" class="ms-auto">
                                <i class="bi bi-facebook"></i> Facebook
                            </a>
                        </div>
                        <small class="form-text text-muted">
                            Don't have an account? <a href="{% url 'signup' %}">Register here</a>
                        </small>

                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
