{% extends 'base.html' %}
{% load static %}
{% block title %}MarketSphere • Signup{% endblock %}
{% block css %}
<link rel="stylesheet" href="{% static 'login.css' %}">
{% endblock %}
{% block content %}
<div class="container">
    <div class="row justify-content-center py-5">
        <div class="col-md-4">
            <div class="card">
                <div class="card-header">
                    <h3>Create Account</h3>
                </div>
                <div class="card-body">
                    <div class="d-flex continue-button me-2">
                        <a href="{% url 'google_login' %}" class="me-2">
                            <i class="bi bi-google"></i> Google
                        </a>
                        <a href="{% url 'google_login' %}" class="ms-auto">
                                <i class="bi bi-facebook"></i> Facebook
                        </a>
                    </div>
                    <div class="divider">
                        <hr>
                        <span>OR</span>
                        <hr>
                    </div>
                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex gap-2">
                            <div class="mb-3">
                                <label for="first_name" class="form-label">First Name</label>
                                <input type="text" class="form-control" id="first_name" name="first_name"
                                    placeholder="John" required>
                            </div>
                            <div class="mb-3 ms-auto">
                                <label for="last_name" class="form-label">Last Name</label>
                                <input type="text" class="form-control" id="last_name" name="last_name"
                                    placeholder="Cristy" required>
                            </div>
                        </div>
                        <div class="d-flex gap-2">
                            <div class="mb-3">
                                <label for="username" class="form-label">Username</label>
                                <input type="text" class="form-control" id="username" name="username"
                                    placeholder="Cristy" required>
                            </div>
                            <div class="mb-3 ms-auto">
                                <label for="contact" class="form-label">Contact Number</label>
                                <input type="number" class="form-control" id="contact" name="contact"
                                    placeholder="1234567890" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" name="email"
                                placeholder="cristy@example.com" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" name="password"
                                placeholder="3qi(l_kiA&b" required>
                        </div>

                        <progress id="password-strength" value="1" max="100"
                            style="width: 100%; height: 5px;"></progress>

                        <div class="my-2">
                            <label for="remember" class="form-check-label" style="font-size: 14px;">
                                <input type="checkbox" class="form-check-input" id="agreement" name="agreement">
                                I agree to the <a href="#">Terms and Conditions</a> & <a href="#">Privacy Policy</a>
                            </label>
                        </div>

                        <button type="submit" class="btn w-auto mb-2s signup">Signup</button>
                    </form>
                    <small class="form-text text-muted">
                        Already have an account? <a href="{% url 'login' %}">Login here</a>
                    </small>

                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
{% block js %}
<script src="{% static 'signup.js' %}"></script>
{% endblock %}
